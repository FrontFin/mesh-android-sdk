name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-version:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      new_version: ${{ steps.version_check.outputs.new_version }}
      version: ${{ steps.version_check.outputs.version }}
      previous_tag: ${{ steps.version_check.outputs.previous_tag }}
      bump_message: ${{ steps.version_check.outputs.bump_message }}

    steps:
      - name: Checkout 🎾
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if new version & bump type 🔍📊
        id: version_check
        run: |
          SEMVER_RE='^[0-9]+\.[0-9]+\.[0-9]+$'

          normalize_semver() {
            local s="$1"
            s="${s//\"/}"
            s="${s#"${s%%[![:space:]]*}"}"
            s="${s%"${s##*[![:space:]]}"}"
            s="${s#v}"
            echo "$s"
          }

          VERSION=$(grep -m1 '^mesh-link[[:space:]]*=' gradle/libs.versions.toml | cut -d= -f2-)
          VERSION=$(normalize_semver "$VERSION")
          LATEST_TAG=$(normalize_semver "$(git tag --sort=-v:refname | head -n 1)")

          if [[ ! "$VERSION" =~ $SEMVER_RE ]]; then
            echo "::error::mesh-link in libs.versions.toml must be MAJOR.MINOR.PATCH (no quotes/v prefix stored in outputs); got: ${VERSION:-<empty>}"
            exit 1
          fi
          if [[ -n "$LATEST_TAG" && ! "$LATEST_TAG" =~ $SEMVER_RE ]]; then
            echo "::error::Latest git tag must be MAJOR.MINOR.PATCH or unset; normalize or fix tag: $(git tag --sort=-v:refname | head -n 1)"
            exit 1
          fi

          echo "Current version in libs.versions.toml: $VERSION"
          echo "Latest git tag: ${LATEST_TAG:-<none>}"

          if [[ "$VERSION" == "$LATEST_TAG" ]]; then
            echo "No new version detected — skipping release"
            echo "new_version=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version detected: $VERSION (previous: $LATEST_TAG)"
            echo "new_version=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "previous_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

            # Determine version bump type for Slack (major / minor / patch vs previous tag).
            PREV_TAG="$LATEST_TAG"
            if [[ -z "$PREV_TAG" ]]; then
              MESSAGE=":package: Release (no previous semver tag)"
            else
              IFS='.' read -r L_MAJOR L_MINOR L_PATCH <<< "$VERSION"
              IFS='.' read -r P_MAJOR P_MINOR P_PATCH <<< "$PREV_TAG"

              if [[ "$L_MAJOR" -gt "$P_MAJOR" ]]; then
                MESSAGE=":exclamation: Major (breaking change)"
              elif [[ "$L_MINOR" -gt "$P_MINOR" ]]; then
                MESSAGE=":yo-yo: Minor (non-breaking change, new feature)"
              else
                MESSAGE=":test_tube: Patch (non-breaking change, bugfix or improvement)"
              fi
            fi
            {
              echo "bump_message<<EOF"
              echo "$MESSAGE"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Validate changelog 📋
        if: steps.version_check.outputs.new_version == 'true'
        run: |
          VERSION="${{ steps.version_check.outputs.version }}"
          if [ ! -f CHANGELOG.md ]; then
            echo "::error::Missing CHANGELOG.md file."
            exit 1
          fi
          if ! grep -Fq "## ${VERSION}" CHANGELOG.md; then
            echo "::error::No changelog entry found for version ${VERSION} in CHANGELOG.md"
            exit 1
          fi
          echo "Changelog entry for ${VERSION} found ✓"

  release:
    needs: check-version
    if: needs.check-version.outputs.new_version == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout 🎾
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java ♨️
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android SDK 🎁
        uses: android-actions/setup-android@v3

      - name: Run ktlint & detekt 🧹
        run: ./gradlew link:ktlintCheck link:detekt

      - name: Run lint 🧼
        run: ./gradlew link:lintRelease

      - name: Run tests & coverage verification 🥁
        run: ./gradlew link:jacocoCoverageVerification

      - name: Build 🧩
        run: ./gradlew link:assembleRelease

      - name: Run sonar ✅
        timeout-minutes: 10
        run: ./gradlew link:sonar
        env:
          ORG_GRADLE_PROJECT_sonarProjectKey: ${{ vars.SONAR_PROJECT_KEY }}
          ORG_GRADLE_PROJECT_sonarOrganization: ${{ vars.SONAR_ORGANIZATION }}
          ORG_GRADLE_PROJECT_sonarHostUrl: ${{ vars.SONAR_HOST_URL }}
          ORG_GRADLE_PROJECT_sonarToken: ${{ secrets.SONAR_TOKEN }}

      - name: Publish release 🎉
        run: ./gradlew link:publishAndReleaseToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}

      - name: Create GitHub Release 🚀
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          PREV_TAG="${{ needs.check-version.outputs.previous_tag }}"

          CHANGELOG_SECTION=$(awk -v version="$VERSION" '$0 == "## " version {found=1; next} found && /^## /{exit} found{print}' CHANGELOG.md)

          cat > /tmp/release_notes.md << EOF
          ## What's Changed

          ${CHANGELOG_SECTION}

          **Full Changelog**: https://github.com/FrontFin/mesh-android-sdk/compare/${PREV_TAG}...${VERSION}
          EOF

          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file /tmp/release_notes.md \
            --target main

          RELEASE_URL="https://github.com/FrontFin/mesh-android-sdk/releases/tag/${VERSION}"
          echo "release_url=$RELEASE_URL" >> "$GITHUB_OUTPUT"

      - name: Send release announcement to Slack 📣
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            blocks:
              - type: "header"
                text:
                  type: "plain_text"
                  text: ":android: Android SDK Release: ${{ needs.check-version.outputs.version }}"
                  emoji: true
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "${{ needs.check-version.outputs.bump_message }}"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "<!subteam^S091246FEDR> view release on <${{ steps.create_release.outputs.release_url }}|${{ github.repository }}>"
