# This workflow runs on pull requests to the main branch and on manual trigger.
# It performs a series of checks including code style, linting, testing, 
# and SonarQube analysis to ensure code quality before merging.
name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout 🎾
        uses: actions/checkout@v6

      - name: Setup Java ♨️
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: 17

      - name: Setup Android SDK 🎁
        uses: android-actions/setup-android@v4

      - name: Run ktlint & detekt 🧹
        run: ./gradlew link:ktlintCheck link:detekt

      - name: Run lint 🧼
        run: ./gradlew link:lintRelease

      - name: Run tests & coverage verification 🥁
        run: ./gradlew link:jacocoCoverageVerification

      - name: Build 🧩
        run: ./gradlew link:assembleRelease

      - name: Run sonar ✅
        timeout-minutes: 10
        run: ./gradlew link:sonar --stacktrace
        env:
          ORG_GRADLE_PROJECT_sonarProjectKey: ${{ vars.SONAR_PROJECT_KEY }}
          ORG_GRADLE_PROJECT_sonarOrganization: ${{ vars.SONAR_ORGANIZATION }}
          ORG_GRADLE_PROJECT_sonarHostUrl: ${{ vars.SONAR_HOST_URL }}
          ORG_GRADLE_PROJECT_sonarToken: ${{ secrets.SONAR_TOKEN }}
